<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>クリーニングみわ 社内FAQ（体験版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface2: #f0f4f8;
    --border: #dde3ea;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --primary-dark: #1d4ed8;
    --success: #059669;
    --success-light: #ecfdf5;
    --warn: #d97706;
    --warn-light: #fffbeb;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --text: #1e293b;
    --text-sub: #64748b;
    --text-muted: #94a3b8;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
    /* ─ LINE風チャット用トークン ─ */
    --line-bg: #8caace;
    --bubble-me: #06c755;
    --bubble-them: #ffffff;
    --notfound-bg: #fff7ed;
  }
  :root {
    --app-w: 540px;
    --chat-fs: 15px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; touch-action: pan-y; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ─── Header ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
    max-width: var(--app-w);
    margin: 0 auto;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
    white-space: nowrap;
  }
  .header-brand .brand-info { display: flex; flex-direction: column; line-height: 1.25; }
  .header-brand .brand-name { font-weight: 700; font-size: 14.5px; color: var(--text); display:flex; align-items:center; gap:7px; }
  #brand-badge {
    display:inline-flex; align-items:center; gap:4px;
    font-size:10.5px; font-weight:800; letter-spacing:.02em;
    padding:2px 8px; border-radius:999px;
    border:1.5px solid rgba(255,255,255,.7); background:rgba(255,255,255,.18);
    color:#fff; white-space:nowrap; flex-shrink:0;
  }
  #brand-badge .bd { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .header-brand .brand-status { font-size: 11px; color: var(--success); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .header-brand .brand-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 3px rgba(5,150,105,.16); }
  .header-brand .dot {
    width: 30px; height: 30px; border-radius: 8px;
    background: #fff url('logo.png') center/80% no-repeat;
    box-shadow: 0 1px 3px rgba(40,55,80,.18), inset 0 0 0 1px rgba(40,55,80,.06);
    flex-shrink: 0;
  }
  .header-badge {
    font-size: 11px; background: var(--warn-light);
    color: var(--warn); border: 1px solid #fde68a;
    padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .tab-nav {
    display: flex; gap: 2px;
  }
  .tab-btn {
    padding: 6px 14px; border: none; background: none;
    font-size: 13px; color: var(--text-sub); cursor: pointer;
    border-radius: var(--radius-sm); font-weight: 500;
    transition: all .15s;
  }
  .tab-btn.active {
    background: var(--primary-light);
    color: var(--primary); font-weight: 600;
  }
  .tab-btn:hover:not(.active) { background: var(--surface2); }

  /* ─── Layout ─── */
  .main { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  /* ─── LINE風チャット ─── */
  body.chat-mode { overflow: hidden; background: #d3dae4; }
  /* チャット見出しはグローバルヘッダーと重複のため非表示 */
  #tab-faq.line-chat {
    max-width: var(--app-w); margin: 0 auto;
    height: calc(100dvh - 56px);
    display: flex; flex-direction: column;
    background: var(--line-bg);
    padding: 0;
    box-shadow: 0 0 0 1px rgba(40,60,90,.05), 0 18px 50px -14px rgba(40,60,90,.32);
  }
  .chat-subhead {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 11px;
    flex-shrink: 0;
  }
  .chat-subhead .avatar {
    width: 40px; height: 40px; border-radius: 11px;
    background: #fff url('logo.png') center/80% no-repeat;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(40,55,80,.16), inset 0 0 0 1px rgba(40,55,80,.06);
  }
  .chat-subhead .info { min-width: 0; }
  .chat-subhead .info .name { font-size: 14.5px; font-weight: 700; color: var(--text); letter-spacing: .01em; white-space: nowrap; }
  .chat-subhead .info .status { font-size: 11.5px; color: var(--success); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .chat-subhead .info .status::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 0 3px rgba(5,150,105,.16);
  }

  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 18px 14px 12px;
    display: flex; flex-direction: column; gap: 2px;
    -webkit-overflow-scrolling: touch;
  }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(40,55,80,.22); border-radius: 3px; }

  .chat-day {
    align-self: center;
    background: rgba(55,72,98,.34);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 3px 14px; border-radius: 20px;
    margin: 2px 0 12px;
  }

  .msg-row { display: flex; gap: 7px; align-items: flex-start; margin-bottom: 11px; }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    background: #fff url('logo.png') center/80% no-repeat;
    flex-shrink: 0;
    box-shadow: 0 1px 3px rgba(40,55,80,.16), inset 0 0 0 1px rgba(40,55,80,.06);
  }
  .msg-group { display: flex; flex-direction: column; max-width: 80%; }
  .msg-name { font-size: 11.5px; color: rgba(255,255,255,.96); margin: 0 0 4px 4px; font-weight: 600; text-shadow: 0 1px 1px rgba(40,55,80,.25); }

  .msg-bundle { display: flex; align-items: flex-end; gap: 6px; }
  .msg-row.them .msg-group { margin-top: 0; }
  .msg-row.me .msg-bundle { flex-direction: row-reverse; }

  .bubble {
    position: relative;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: var(--chat-fs); line-height: 1.65;
    word-break: break-word;
    box-shadow: 0 1px 1.5px rgba(40,55,80,.14);
  }
  .bubble.them {
    background: var(--bubble-them); color: var(--text);
    border-top-left-radius: 5px;
  }
  .bubble.them::before {
    content: ''; position: absolute; top: 0; left: -5px;
    width: 11px; height: 15px; background: var(--bubble-them);
    clip-path: polygon(100% 0, 100% 100%, 0 0);
  }
  .bubble.me {
    background: var(--bubble-me); color: #fff;
    border-top-right-radius: 5px;
  }
  .bubble.me::before {
    content: ''; position: absolute; top: 0; right: -5px;
    width: 11px; height: 15px; background: var(--bubble-me);
    clip-path: polygon(0 0, 0 100%, 100% 0);
  }
  .bubble.notfound { background: var(--notfound-bg); color: var(--text); box-shadow: 0 1px 1.5px rgba(40,55,80,.14), inset 0 0 0 1px #fde6cf; }
  .bubble.notfound::before { background: var(--notfound-bg); }

  .msg-time { font-size: 10px; color: rgba(255,255,255,.9); flex-shrink: 0; margin-bottom: 2px; text-shadow: 0 1px 1px rgba(40,55,80,.25); }
  .msg-row.them .msg-time { color: rgba(255,255,255,.9); }

  /* バブル内の3部構成見出し */
  .bubble .sec-h { font-weight: 700; font-size: calc(var(--chat-fs) - 3px); margin: 8px 0 3px; letter-spacing: .03em; }
  .bubble .sec-h:first-child { margin-top: 0; }
  .bubble ul { margin: 5px 0 5px 20px; padding: 0; }
  .bubble li { margin: 2px 0; }
  .bubble .src {
    margin-top: 9px; font-size: calc(var(--chat-fs) - 4px); color: var(--text-muted);
    border-top: 1px solid rgba(40,55,80,.09); padding-top: 7px; line-height: 1.5;
  }
  .bubble .imgs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .bubble .imgs img {
    max-width: 132px; max-height: 100px; border-radius: 10px;
    border: 1px solid var(--border); object-fit: cover; cursor: pointer;
    transition: transform .15s;
  }
  .bubble .imgs img:hover { transform: scale(1.03); }

  /* タイピングインジケータ */
  .typing { display: flex; gap: 4px; padding: 4px 2px; align-items: center; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #aab2bd;
    animation: typing 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: .45; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ─── ストリーミングカーソル ─── */
  .stream-cursor { display: inline-block; animation: blink .7s infinite; color: var(--primary); font-weight: 400; }
  @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }

  /* ─── ついで読み（関連回答） ─── */
  .related-wrap { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .related-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 7px; letter-spacing: .04em; }
  .related-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 4px; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; }
  .related-item:hover { background: var(--primary-light); }
  .related-q { font-size: 13px; color: var(--text); flex: 1; line-height: 1.4; }
  .related-arr { font-size: 15px; color: var(--text-muted); flex-shrink: 0; }

  /* ─── 料金マスク ─── */
  .price-masked { background: #fef9c3; color: #92400e; border-radius: 4px; padding: 1px 7px; font-size: 12px; font-weight: 700; white-space: nowrap; }

  /* 入力バー */
  .chat-inputbar {
    flex-shrink: 0;
    background: #ffffff;
    border-top: 1px solid var(--border);
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    display: flex; align-items: flex-end; gap: 9px;
  }
  .chat-inputbar textarea {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 15px; font-family: inherit;
    resize: none; outline: none;
    max-height: 100px; min-height: 42px;
    background: var(--surface2);
    line-height: 1.45;
    transition: border-color .15s, background .15s;
  }
  .chat-inputbar textarea:focus { border-color: var(--bubble-me); background: #fff; }
  .chat-send {
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: var(--bubble-me); color: white;
    font-size: 18px; cursor: pointer; flex-shrink: 0;
    display: grid; place-items: center;
    transition: background .15s, transform .1s;
    box-shadow: 0 2px 8px rgba(6,199,85,.32);
  }
  .chat-send:hover { background: #05b34c; }
  .chat-send:active { transform: scale(.92); }
  .chat-send:disabled { background: #c5ccd3; cursor: not-allowed; box-shadow: none; }

  .chat-quick {
    display: flex; gap: 7px; padding: 0 14px 11px; flex-wrap: wrap;
    flex-shrink: 0; background: var(--line-bg);
  }
  .chat-quick button {
    background: rgba(255,255,255,.96); border: none;
    border-radius: 18px; padding: 7px 14px;
    font-size: 12.5px; color: var(--primary); cursor: pointer;
    font-family: inherit; white-space: nowrap; font-weight: 600;
    box-shadow: 0 1px 3px rgba(40,55,80,.14);
    transition: transform .1s, background .15s;
  }
  .chat-quick button:hover { background: #fff; transform: translateY(-1px); }
  .chat-quick button:active { transform: translateY(0); }

  /* ─── 文字サイズ設定 ─── */
  .fs-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .fs-btn {
    flex: 1; min-width: 64px;
    padding: 10px 12px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-sub);
    border-radius: 10px; cursor: pointer; font-family: inherit;
    font-weight: 600; font-size: 14px; transition: all .15s;
  }
  .fs-btn:nth-child(1) { font-size: 13px; }
  .fs-btn:nth-child(2) { font-size: 15px; }
  .fs-btn:nth-child(3) { font-size: 17px; }
  .fs-btn:nth-child(4) { font-size: 19px; }
  .fs-btn:hover { border-color: var(--bubble-me); }
  .fs-btn.active {
    background: var(--bubble-me); border-color: var(--bubble-me);
    color: #fff; box-shadow: 0 2px 8px rgba(6,199,85,.28);
  }
  .fs-preview {
    margin-top: 14px; padding: 14px; border-radius: 12px;
    background: var(--line-bg);
  }
  .fs-preview-bubble {
    display: inline-block; background: #fff; color: var(--text);
    padding: 10px 14px; border-radius: 18px; border-top-left-radius: 5px;
    font-size: var(--chat-fs); line-height: 1.65;
    box-shadow: 0 1px 1.5px rgba(40,55,80,.14); max-width: 90%;
  }

  /* ─── Card ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: center; gap: 8px;
  }
  .card-head h2 { font-size: 14px; font-weight: 600; color: var(--text); }
  .card-body { padding: 20px; }

  /* ─── FAQ画面 ─── */
  .search-wrap {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .search-input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--primary); }
  .btn {
    padding: 10px 20px;
    border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-family: inherit;
    font-weight: 600; cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #047857; }
  .btn-outline {
    background: none; border: 1px solid var(--border);
    color: var(--text-sub); font-weight: 500;
  }
  .btn-outline:hover { background: var(--surface2); }

  .answer-box {
    border-radius: var(--radius-sm);
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
  }
  .answer-box.found {
    background: var(--success-light);
    border: 1px solid #a7f3d0;
  }
  .answer-box.notfound {
    background: var(--warn-light);
    border: 1px solid #fde68a;
  }
  .answer-box.loading {
    background: var(--primary-light);
    border: 1px solid #bfdbfe;
    color: var(--primary);
  }
  .answer-label {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .answer-box.found .answer-label { color: var(--success); }
  .answer-box.notfound .answer-label { color: var(--warn); }
  .answer-text { color: var(--text); }
  .answer-source {
    margin-top: 10px; font-size: 12px;
    color: var(--text-muted); font-style: italic;
  }
  .answer-images {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
  }
  .answer-images img {
    max-width: 160px; max-height: 120px;
    border-radius: 8px; border: 1px solid var(--border);
    object-fit: cover; cursor: pointer;
    transition: transform .15s;
  }
  .answer-images img:hover { transform: scale(1.03); }
  .answer-text strong { font-weight: 700; }
  .answer-text ul { margin: 6px 0 6px 20px; }

  /* ─── 知識ベース ─── */
  .kb-add-form {
    display: flex; flex-direction: column; gap: 10px;
    padding: 16px;
    background: var(--primary-light);
    border: 1px solid #bfdbfe;
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
  }
  .kb-add-form label {
    font-size: 12px; font-weight: 600; color: var(--primary);
  }
  .form-input, .form-textarea {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    background: white;
    transition: border-color .15s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
  .form-textarea { resize: vertical; min-height: 72px; }
  .form-row { display: flex; gap: 8px; }

  .kb-list { display: flex; flex-direction: column; gap: 8px; }
  .kb-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .kb-item-head {
    padding: 12px 16px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .kb-item-q {
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .kb-tag {
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
    background: var(--primary-light); color: var(--primary);
    border: 1px solid #bfdbfe;
  }
  .kb-item-body {
    padding: 12px 16px;
    font-size: 13px; line-height: 1.7; color: var(--text);
    border-top: 1px solid var(--border);
    display: none;
  }
  .kb-item-body.open { display: block; }
  .kb-item-source {
    margin-top: 8px; font-size: 11px; color: var(--text-muted); font-style: italic;
  }
  .kb-empty {
    text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px;
  }

  /* ─── 資料から一括取り込み ─── */
  .import-candidate {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 12px;
    background: var(--surface);
  }
  .import-cand-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .import-badge {
    font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 20px;
    background: var(--primary-light); color: var(--primary);
    border: 1px solid #bfdbfe; flex-shrink: 0;
  }
  .import-field { margin-bottom: 8px; }
  .import-field label {
    font-size: 11px; font-weight: 600; display: block; margin-bottom: 3px;
  }
  .import-field .lbl-k { color: #185fa5; }
  .import-field .lbl-p { color: #854f0b; }
  .import-field .lbl-b { color: #0f6e56; }
  .import-del {
    width: 30px; height: 30px; padding: 0; flex-shrink: 0;
    display: grid; place-items: center; color: var(--danger);
  }
  .import-summary {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    font-size: 13px; font-weight: 600;
  }
  .dup-warn {
    background: var(--warn-light); border: 1px solid #fde68a;
    border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px;
    font-size: 12px;
  }
  .dup-warn-title { color: var(--warn); font-weight: 700; margin-bottom: 4px; }
  .dup-compare {
    background: white; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; margin: 6px 0; font-size: 12px; line-height: 1.5;
  }
  .dup-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .dup-actions button {
    font-size: 11px; padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: white; cursor: pointer;
    font-family: inherit; color: var(--text-sub);
  }

<script>
// ═══════════════════════════════════════════════
//  ★設定：GASプロキシのURL
//  Code.gsをデプロイして得た /exec のURLをここに貼る
//  （空のままだと api.anthropic.com を直接呼ぶ＝claude.ai上の動作確認用）
// ═══════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwgjgqVJNFNnNwNyzc8DsskESrfvoSSTgpK6T2twFPTVyDrhnR2NhNy_CLiajfB1pC_OA/exec';

// ── クラウド知識ベース（FAQ管理と共有）──────────────────────────
const FAQ_CHAT_CLOUD_KEY = 'miwa.faq.cloud.v1';

// ── 料金表連携 ─────────────────────────────────────────────
const FAQ_TAX = 1.10;
function normStr(s){ return (s||'').normalize('NFKC').toLowerCase(); }

function loadFaqPriceData() {
  const brand = faqBrand();
  const lsKey  = brand==='blue' ? 'miwa.price.blue.v3'       : 'miwa.price.green.v3';
  const editKey = brand==='blue' ? 'miwa.price.edits.blue.v1' : 'miwa.price.edits.v1';
  let data=null;
  try{ const s=localStorage.getItem(lsKey); if(s) data=JSON.parse(s); }catch(e){}
  if(!data) data = brand==='blue'?(window.PRICE_SEED_BLUE||null):(window.PRICE_SEED||null);
  let edits={};
  try{ const e=localStorage.getItem(editKey); if(e) edits=JSON.parse(e); }catch(e){}
  return {data,edits};
}
function _applyPEdit(item,edits){
  const e=edits[item.code];
  if(!e) return item;
  if(e.deleted) return null;
  return {...item,...e};
}
function findPriceItems(query,max=10){
  const {data,edits}=loadFaqPriceData();
  if(!data) return [];
  // 助詞・助動詞で分割して日本語キーワードを抽出
  const _qn = normStr(query);
  const _rawWords = _qn.split(/[\s\u3001\u3002\u300c\u300d\uff01\uff1f\u306e\u3092\u304c\u306f\u306b\u3067\u3082\u3084\u304b\u3089\u307e\u3067\u3066\u305f\u3067\u3059\u307e\u3059]+/).filter(w=>w.length>=2);
  // 単語が少ない場合は文字2グラムも加える
  const searchWords = [..._rawWords];
  for (let _i=0; _i<_qn.length-1; _i++){
    const _bi=_qn.slice(_i,_i+2);
    if(!searchWords.includes(_bi)) searchWords.push(_bi);
  }
  const all=[...(data.cleaning||[]),...(data.special||[]),...(data.reform||[])];
  try{
    const fd=JSON.parse(localStorage.getItem('miwa.price.func.v1')||'null');
    const sd=JSON.parse(localStorage.getItem('miwa.price.sales.v1')||'null');
    if(fd) all.push(...(fd.items||[]));
    if(sd) all.push(...(sd.items||[]));
  }catch(e){}
  return all.map(item=>{
    const a=_applyPEdit(item,edits);
    if(!a) return null;
    const hay=normStr((a.name||'')+(a.cat||''));
    let sc=0; for(const w of searchWords){if(hay.includes(w))sc+=w.length;}
    return sc>0?{...a,_sc:sc}:null;
  }).filter(Boolean).sort((a,b)=>b._sc-a._sc).slice(0,max);
}
function formatPriceForAI(items){
  if(!items.length) return '';
  const isBlue=faqBrand()==='blue';
  const brandName=isBlue?'青のみわ':'緑のみわ';
  const fmt=p=>p?Math.round(p*FAQ_TAX).toLocaleString('ja-JP')+'円（税込）':'';
  const lines=items.map(item=>{
    const name=item.name||'',cat=item.cat?`[${item.cat}]`:'';
    if(item.sqm&&item.sqmPrice) return `${cat}${name}: ${Math.round(item.sqmPrice*FAQ_TAX)}円/㎡（税込）`;
    if(item.ys){const p=[];if(item.p1)p.push('定価'+fmt(item.p1));if(item.mp)p.push('会員'+fmt(item.mp));return `${cat}${name}: ${p.join('、')}`;}
    const c=[],lbl1=(item.p4||item.p5||item.p6)?(isBlue?'エコノミー':'レギュラー'):'';
    if(item.p1)c.push((lbl1?lbl1+' ':'')+fmt(item.p1));
    if(item.p4)c.push((isBlue?'スタンダード':'デリケート')+' '+fmt(item.p4));
    if(item.p5)c.push((isBlue?'プレミアム':'ブランド')+' '+fmt(item.p5));
    if(!isBlue&&item.p6)c.push('ハイブランド '+fmt(item.p6));
    return `${cat}${name}: ${c.join('、')}`;
  });
  return '\n\n[料金表（'+brandName+'・税込）]\n'+lines.join('\n')+'\n※知識ベースに料金記載があればこの料金表を優先すること。';
}
function detectSqm(q){
  const m=q.match(/(\d+(?:[.,]\d+)?)\s*[m]?\s*[x×X*]\s*(\d+(?:[.,]\d+)?)\s*[m]?/i);
  if(!m) return null;
  const w=parseFloat(m[1].replace(',','.')),h=parseFloat(m[2].replace(',','.'));
  if(isNaN(w)||isNaN(h)||w<=0||h<=0) return null;
  return {w,h,area:Math.round(w*h*100)/100};
}
function calcSqmSupplement(question){
  const sqm=detectSqm(question);
  if(!sqm) return '';
  const {data,edits}=loadFaqPriceData();
  if(!data) return '';
  const sqmItems=[...(data.special||[]),...(data.cleaning||[])].map(i=>_applyPEdit(i,edits)).filter(i=>i&&i.sqm&&i.sqmPrice);
  const normQ=normStr(question);
  const matched=sqmItems.map(i=>({...i,_sc:normStr((i.name||'')+(i.cat||'')).split('').filter(c=>normQ.includes(c)).length})).filter(i=>i._sc>0).sort((a,b)=>b._sc-a._sc);
  if(!matched.length) return '';
  const item=matched[0];
  const unitTax=Math.round(item.sqmPrice*FAQ_TAX);
  const total=Math.round(item.sqmPrice*sqm.area*FAQ_TAX);
  return '\n\n[㎡計算結果] '+item.name+'（'+item.cat+'）: '+sqm.w+'m × '+sqm.h+'m = '+sqm.area+'㎡ → 約'+total.toLocaleString('ja-JP')+'円（税込）。単価'+unitTax+'円/㎡。この計算結果を回答に含めること。';
}

// ── 知識資料ストック検索 ─────────────────────────────────────
const FAQ_DOCS_LS_KEY = 'miwa.faq.docs.v1';
function loadFaqDocsForSearch() {
  try { const s=localStorage.getItem(FAQ_DOCS_LS_KEY); return s?JSON.parse(s):[]; } catch(e){ return []; }
}
function searchDocuments(question, maxPassages=4, maxChars=1000) {
  const docs = loadFaqDocsForSearch();
  if (!docs.length) return '';
  const words = normStr(question).split(/[\s\u3001\u3002\uff01\uff1f\u300c\u300d\u3010\u3011\n]+/).filter(w=>w.length>=2);
  if (!words.length) return '';
  const results = [];
  for (const doc of docs) {
    const paragraphs = doc.content.split(/\n/).filter(p=>p.trim().length>5);
    for (const para of paragraphs) {
      const trimmed = para.trim();
      const score = words.filter(w=>normStr(trimmed).includes(w)).length;
      if (score>0) results.push({text:trimmed, score, title:doc.title});
    }
  }
  if (!results.length) return '';
  results.sort((a,b)=>b.score-a.score);
  const top=[]; let chars=0;
  for (const r of results) {
    if (top.length>=maxPassages||chars>=maxChars) break;
    top.push(r); chars+=r.text.length;
  }
  const grouped={};
  for (const r of top) { if(!grouped[r.title]) grouped[r.title]=[]; grouped[r.title].push(r.text); }
  const sections=Object.entries(grouped).map(([t,txts])=>'【'+t+'】\n'+txts.join('\n'));
  return '\n\n[参考資料（キーワード検索）]\n'+sections.join('\n\n')+'\n※上記の資料内容も参考にして回答してください。';
}

async function loadKBFromCloud() {
  const DEFAULT_KB_GAS = 'https://script.google.com/macros/s/AKfycbzWq4dsfENPZuZ9eGGum5Glg2pDcLf10bL8dJNvJgr66cgUOHAFGWPJNmkRUl3CpAml/exec';
  try {
    const s = localStorage.getItem(FAQ_CHAT_CLOUD_KEY);
    const cfg = s ? JSON.parse(s) : {};
    const gasUrl = cfg.gasUrl || DEFAULT_KB_GAS;
    if (!gasUrl) return;
    const res = await fetch(gasUrl + '?action=get_kb');
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      const loaded = data
        .filter(item => item.enabled !== false)
        .map(item => ({
          ...item,
          images: typeof item.images === 'string'
            ? item.images.split(',').filter(Boolean)
            : (Array.isArray(item.images) ? item.images : []),
        }));
      if (loaded.length > 0) {
        knowledgeBase = loaded;
        console.log('[FAQ] クラウドから知識ベースを読み込みました：', loaded.length, '件');
      }
    }
  } catch(e) {
    console.warn('[FAQ] クラウドKB読み込み失敗（ローカルで継続）:', e.message);
  }
}

let knowledgeBase = [
  {

    category: "素材確認",

  },
  {

function searchKnowledge(question) {
  const q = question.replace(/[？。、！\s]/g, '').toLowerCase();
  if (!q) return null;

  let best = null;
  let bestScore = 0;

  for (const item of knowledgeBase) {
    const qText = item.q.replace(/[？。、！\s]/g, '').toLowerCase();
    const aText = item.a.replace(/[？。、！\s]/g, '').toLowerCase();
    const catText = (item.category || '').toLowerCase();

    let score = 0;

    // 完全一致
    if (qText.includes(q) || q.includes(qText)) score += 50;

    // 部分マッチ（2文字以上のチャンク）
    for (let len = Math.min(q.length, 6); len >= 2; len--) {
      for (let i = 0; i <= q.length - len; i++) {
        const chunk = q.slice(i, i + len);
        if (qText.includes(chunk)) score += len * 3;
        if (aText.includes(chunk)) score += len;
        if (catText.includes(chunk)) score += len * 2;
      }
    }

    if (score > bestScore) {
      bestScore = score;
      best = { item, score };
    }
  }

  // スコアが低すぎる場合はヒットなし
  if (bestScore < 6) return null;
  return best;
}

【出力形式（必ずこの形式で書く）】
1行目: 回答できる場合は「STATUS:FOUND」、できない場合は「STATUS:NOT_FOUND」とだけ書く
2行目: 回答に使った知識の番号を「REF:1,3」の形式で書く。回答できない場合は「REF:なし」
3行目以降: 上記の構成で回答本文。回答できない場合は本文不要

【知識ベース】
${kbText || '（まだ知識が登録されていません）'}${priceSupplement}${sqmSupplement}${docSupplement}`;

  // GAS_URLが設定されていればGAS経由（本番）、空ならapi.anthropic.com直叩き（claude.ai上の確認用）
  const useGas = GAS_URL && GAS_URL.trim() !== '';
  const endpoint = useGas ? GAS_URL : 'https://api.anthropic.com/v1/messages';
  const response = await fetch(endpoint, {
    method: 'POST',
    // GAS経由はCORSプリフライト回避のため text/plain、直叩きは application/json
    headers: { 'Content-Type': useGas ? 'text/plain;charset=utf-8' : 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: question }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || err.error || `API Error ${response.status}`);
  }

  const data = await response.json();
  // GASプロキシやAnthropicがerror本文を返した場合
  if (data.error) {
    throw new Error(typeof data.error === 'string' ? data.error : (data.error.message || 'APIエラー'));
  }
  const raw = data.content?.find(c => c.type === 'text')?.text || '';

  // 構造化レスポンスを解析
  const lines = raw.split('\n');
  let unanswered = true;
  let refs = [];
  let bodyStart = 0;

  for (let i = 0; i < Math.min(lines.length, 3); i++) {
    const line = lines[i].trim();
    if (line.startsWith('STATUS:')) {
      unanswered = !line.includes('FOUND') || line.includes('NOT_FOUND');
      bodyStart = i + 1;
    } else if (line.startsWith('REF:')) {
      refs = (line.replace('REF:', '').match(/\d+/g) || [])
        .map(n => parseInt(n, 10) - 1)
        .filter(idx => idx >= 0 && idx < knowledgeBase.length);
      bodyStart = i + 1;
    }
  }

  const text = lines.slice(bodyStart).join('\n').trim() || raw;
  const refItems = refs.map(idx => knowledgeBase[idx]);

  return { text, unanswered, refItems };
}

// ─── ストリーミング表示（タイピング風） ─────────────────────
// GASはSSEを使えないため「全文受信→文字を順次表示」で体感速度を改善
function streamIntoBubble(typingRow, rawText, finalHtml, opts = {}) {
  return new Promise(resolve => {
    const bubbleClass = opts.notfound ? 'bubble them notfound' : 'bubble them';
    typingRow.className = 'msg-row them';
    typingRow.innerHTML = `
      <div class="msg-avatar"></div>
      <div class="msg-group">
        <div class="msg-name">FAQ</div>
        <div class="msg-bundle">
          <div class="${bubbleClass}"><span class="stream-text"></span><span class="stream-cursor">\u2502</span></div>
        </div>
      </div>`;
    scrollChat();
    const span = typingRow.querySelector('.stream-text');
    const cursor = typingRow.querySelector('.stream-cursor');
    // 速度：約150〜200文字/秒（16ms × 3文字 = 56ms/10文字 ≒ 180文字/秒）
    const chars = [...rawText]; let i = 0;
    const id = setInterval(() => {
      const end = Math.min(i + 4, chars.length);
      span.textContent += chars.slice(i, end).join(''); i = end; scrollChat();
      if (i >= chars.length) {
        clearInterval(id); cursor.remove();
        const b = typingRow.querySelector('.msg-bundle');
        b.innerHTML = `<div class="${bubbleClass}">${finalHtml}</div><span class="msg-time">${nowTime()}</span>`;
        scrollChat(); resolve();
      }
    }, 18);
  });
}

function findRelated(question, usedRefs, topN = 3) {
  const usedIds = new Set((usedRefs || []).map(r => r.id));
  const cats = new Set((usedRefs || []).map(r => r.category).filter(Boolean));
  const qNorm = question.replace(/[？。、！\s]/g, '').toLowerCase();
  return knowledgeBase
    .filter(kb => !usedIds.has(kb.id))
    .map(kb => {
      let score = 0;
      if (cats.has(kb.category)) score += 3;
      const kbStr = (kb.q + kb.a).toLowerCase();
      // 2文字以上の部分一致
      for (let j = 0; j < qNorm.length - 1; j++) {
        const bi = qNorm.slice(j, j + 2);
        if (kbStr.includes(bi)) score += 0.5;
      }
      return { kb, score };
    })
    .filter(x => x.score >= 1)
    .sort((a, b) => b.score - a.score)
    .slice(0, topN)
    .map(x => x.kb);
}
function renderRelated(items) {
  if (!items.length) return '';
  return `<div class="related-wrap">
    <div class="related-label">\ud83d\udcd6 \u3064\u3044\u3067\u8aad\u307f — \u95a2\u9023\u3059\u308b\u5185\u5bb9</div>
    ${items.map(kb => `<div class="related-item" onclick="showRelatedKB(${kb.id})">
      <span class="related-q">${escHtml(kb.q)}</span><span class="related-arr">\u203a</span></div>`).join('')}
  </div>`;
}
function showRelatedKB(id) {
  const kb = knowledgeBase.find(k => k.id === id);
  if (!kb) return;
  const finalHtml = maskPrices(mdToHtml(kb.a))

    + `<div class="src">\ud83d\udcda \u95a2\u9023\uff1a${escHtml(kb.category || '')}</div>`;
  addBotBubble(finalHtml);
}

  return html
    .replace(/¥[\d,]+/g, '<span class="price-masked">\ud83d\udcb4 \u6599\u91d1\u8868\u53c2\u7167</span>')
    .replace(/\d[\d,]*円(?:\s*(?:税込|税抜|[\(（][^)\uff09]{0,12}[\)\uff09]))?/g, '<span class="price-masked">\ud83d\udcb4 \u6599\u91d1\u8868\u53c2\u7167</span>');
}

// ═══════════════════════════════════════════════
//  FAQログ送信（第3段階：全端末共有）
//  質問のたびに共有データGAS（みわ共有API）へ fire-and-forget 送信。
//  GAS URLは localStorage miwa.faq.cloud.v1 の gasUrl を流用。
// ═══════════════════════════════════════════════
function faqDeviceId() {
  const key = 'miwa.faq.device.v1';
  try {
    let id = localStorage.getItem(key);
    if (!id) { id = 'D' + Date.now() + Math.random().toString(36).slice(2, 7); localStorage.setItem(key, id); }
    return id;
  } catch(e) { return 'unknown'; }
}
function faqStoreName() {
  // URLパラメータ ?store=XXX を優先。なければ localStorage miwa.faq.store
  try {
    const p = new URLSearchParams(location.search).get('store');
    if (p) return decodeURIComponent(p);
    return localStorage.getItem('miwa.faq.store') || '';
  } catch(e) { return ''; }
}
function sendFaqLogToCloud(q, a, answered) {
  const DEFAULT_KB_GAS = 'https://script.google.com/macros/s/AKfycbzWq4dsfENPZuZ9eGGum5Glg2pDcLf10bL8dJNvJgr66cgUOHAFGWPJNmkRUl3CpAml/exec';
  try {
    const s = localStorage.getItem(FAQ_CHAT_CLOUD_KEY);
    const cfg = s ? JSON.parse(s) : {};
    const gasUrl = cfg.gasUrl || DEFAULT_KB_GAS;
    if (!gasUrl) return;
    fetch(gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'logFaq',
        entry: {
          q:        q  || '',
          a:        a  || '',
          answered: !!answered,
          store:    faqStoreName(),
          device:   faqDeviceId(),
          ts:       new Date().toISOString(),
        }
      })
    }).catch(() => {}); // fire-and-forget（失敗しても続行）
  } catch(e) {}
}

async function askQuestion() {
  const input = document.getElementById('question-input');
  const question = input.value.trim();
  if (!question) return;
  lastQuestion = question;

  const btn = document.getElementById('ask-btn');
  btn.disabled = true;
  addUserBubble(question);
  input.value = '';
  autoGrow(input);

  const typingRow = addTyping();

  try {
    const result = await getAIAnswer(question);
    const answered = !result.unanswered;

    if (answered) {
      statsAnswered++;
      const related = findRelated(question, result.refItems);
      const finalHtml = maskPrices(mdToHtml(result.text))
        + imagesHtml(result.refItems).replace('answer-images', 'imgs')
        + `<div class="src">\ud83d\udcda \u77e5\u8b58\u30d9\u30fc\u30b9\u3088\u308a\u56de\u7b54${refLabel(result.refItems)}</div>`
        + renderRelated(related);
      await streamIntoBubble(typingRow, result.text, finalHtml);
    } else {
      addToUnanswered(question);
      addBotBubble(
        `この質問への回答はまだ知識ベースに登録されていません。<br>管理者が確認して回答を追加します🙏<br><span class="src">⚠️ 未回答リストに記録しました</span>`,
        { notfound: true }, typingRow);
    }

    historyLog.unshift({ q: question, answered, time: nowStr() });
    sendFaqLogToCloud(question, answered ? (result && result.text) || '' : '', answered);
    updateStats();

  } catch (err) {
    addBotBubble(
      `⚠️ APIに接続できませんでした<br><span style="font-size:12px;color:var(--text-muted)">${escHtml(err.message)}</span><br><br>
       APIキーなしでもローカル検索で動作確認できます。<br>
       <button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="askLocal()">ローカル検索で試す</button>`,
      { notfound: true }, typingRow);
  }

  btn.disabled = false;
}

function askLocal() {
  const question = (document.getElementById('question-input').value.trim()) || lastQuestion;
  if (!question) return;

  const result = searchKnowledge(question);

  if (result) {
    statsAnswered++;
    const html = `${mdToHtml(result.item.a)}
      ${imagesHtml([result.item]).replace('answer-images', 'imgs')}
      <div class="src">📚 ローカル検索｜${escHtml(result.item.category || '未分類')}</div>`;
    addBotBubble(html);
    historyLog.unshift({ q: question, answered: true, time: nowStr() });
  } else {
    addToUnanswered(question);
    addBotBubble(
      `この質問への回答はまだ登録されていません。<br><span class="src">⚠️ 未回答リストに記録しました</span>`,
      { notfound: true });
    historyLog.unshift({ q: question, answered: false, time: nowStr() });
  }
  updateStats();
}

function addToUnanswered(question) {
  // 重複チェック
  if (unansweredList.find(u => u.q === question)) return;
  const entry = { id: nextId++, q: question, addedAt: nowStr(), answered: false };
  unansweredList.unshift(entry);
  // FAQ管理と共有するためlocalStorageに保存
  try {
    const s = localStorage.getItem('miwa.faq.kb.v1');
    const data = s ? JSON.parse(s) : {};
    const ua = Array.isArray(data.unansweredList) ? data.unansweredList : [];
    if (!ua.find(u => u.q === question)) {
      ua.unshift(entry);
      data.unansweredList = ua;
      if (!data.nextId || data.nextId <= entry.id) data.nextId = entry.id + 1;
      localStorage.setItem('miwa.faq.kb.v1', JSON.stringify(data));
    }
  } catch(e) {}
  renderUnanswered();
}

function approveAnswer(id) {
  const item = unansweredList.find(u => u.id === id);

let importCandidates = [];

// AI呼び出し（生テキストを返す共通関数。GAS_URLがあればGAS経由）
async function callAIRaw(systemPrompt, userContent, maxTokens) {
  const useGas = GAS_URL && GAS_URL.trim() !== '';
  const endpoint = useGas ? GAS_URL : 'https://api.anthropic.com/v1/messages';
  const response = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': useGas ? 'text/plain;charset=utf-8' : 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: maxTokens || 1500,
      system: systemPrompt,
      messages: [{ role: 'user', content: userContent }]
    })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || err.error || `API Error ${response.status}`);
  }
  const data = await response.json();
  if (data.error) throw new Error(typeof data.error === 'string' ? data.error : (data.error.message || 'APIエラー'));
  return data.content?.find(c => c.type === 'text')?.text || '';
}

// 既存カテゴリ一覧
function existingCategories() {
  return [...new Set(knowledgeBase.map(k => k.category).filter(Boolean))];
}

// 質問文ベースの類似既存知識を探す（重複検出用）
function findSimilarKnowledge(question) {
  const q = (question || '').replace(/[？。、！\s]/g, '').toLowerCase();
  if (!q) return null;
  let best = null, bestScore = 0;
  for (const item of knowledgeBase) {
    const qT = item.q.replace(/[？。、！\s]/g, '').toLowerCase();
    let score = 0;
    if (qT.includes(q) || q.includes(qT)) score += 40;
    for (let len = Math.min(q.length, 6); len >= 2; len--) {
      for (let i = 0; i <= q.length - len; i++) {
        if (qT.includes(q.slice(i, i + len))) score += len * 2;
      }
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore >= 12 ? { item: best, score: bestScore } : null;
}

// 「AIで仕分け」
async function bulkSort() {
  const src = document.getElementById('import-src').value.trim();
  if (!src) { alert('資料テキストを貼り付けてください'); return; }

  const btn = document.getElementById('import-btn');
  const result = document.getElementById('import-result');
  btn.disabled = true;
  btn.textContent = '⏳ 仕分け中...';
  result.innerHTML = '<div style="font-size:13px;color:var(--text-sub)">AIが資料を読んで知識候補に分けています...</div>';

  const cats = existingCategories();
  const systemPrompt = `あなたはクリーニング店「クリーニングみわ」の知識ベース編集アシスタントです。
渡された資料テキストを、社内FAQ用の「知識候補」に分解してください。

【ルール】
- 1つの話題ごとに1件の候補に分ける
- 各候補は次の項目を持つ：
  - question：受付・工場スタッフが実際に聞きそうな質問文
  - knowledge：事実・基準・理由
  - procedure：受付や処理での手順（資料に無ければ空文字 ""）
  - proposal：お客様への提案（資料に無ければ空文字 ""）
  - category：カテゴリ
- categoryは可能な限り既存カテゴリから選ぶ。合うものが無いときだけ新しいカテゴリ名を付ける
- 資料に書かれていないことは創作しない。手順・提案が無ければ空文字にする
- 既存カテゴリ一覧：${cats.join('、') || '（まだ無し）'}

【出力形式】
JSON配列だけを出力する。前置き・説明・コードフェンス(\`\`\`)は一切付けない。
[{"question":"...","knowledge":"...","procedure":"...","proposal":"...","category":"..."}]`;

  try {
    const raw = await callAIRaw(systemPrompt, src, 2500);
    // JSON抽出（保険：最初の[から最後の]まで）
    let jsonText = raw.trim();
    const s = jsonText.indexOf('['), e = jsonText.lastIndexOf(']');
    if (s !== -1 && e !== -1) jsonText = jsonText.slice(s, e + 1);
    const arr = JSON.parse(jsonText);

    importCandidates = arr.map((c, i) => {
      const q = c.question || '';
      const dup = findSimilarKnowledge(q);
      return {
        id: 'imp' + i,
        q,
        knowledge: c.knowledge || '',
        procedure: c.procedure || '',
        proposal: c.proposal || '',
        category: c.category || '未分類',
        image: '',
        catMode: cats.includes(c.category) ? 'existing' : (c.category ? 'new' : 'existing'),
        dup,
        decision: dup ? 'overwrite' : 'new'   // 重複時は既定で上書き提案（変更可）
      };
    });

    renderImport();
  } catch (err) {
    result.innerHTML = `<div class="dup-warn"><div class="dup-warn-title">⚠️ 仕分けに失敗しました</div>
      <div>${escHtml(err.message)}</div>
      <div style="margin-top:6px;color:var(--text-muted)">AIの応答がJSON形式にならなかった可能性があります。テキストを短くするか、もう一度お試しください。</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = '🪄 AIで仕分け';
}

// 編集中のDOM値を状態へ反映（再描画前に呼ぶ）
function syncImportFromDom() {
  for (const c of importCandidates) {
    const get = (suf) => { const el = document.getElementById(`${suf}-${c.id}`); return el ? el.value : undefined; };
    const q = get('imp-q'); if (q !== undefined) c.q = q;
    const k = get('imp-k'); if (k !== undefined) c.knowledge = k;
    const p = get('imp-p'); if (p !== undefined) c.procedure = p;
    const b = get('imp-b'); if (b !== undefined) c.proposal = b;
    const img = get('imp-img'); if (img !== undefined) c.image = img;
    if (c.catMode === 'new') { const cn = get('imp-catnew'); if (cn !== undefined) c.category = cn; }
    else { const cs = get('imp-cat'); if (cs !== undefined && cs !== '__new__') c.category = cs; }
  }
}

function renderImport() {
  const result = document.getElementById('import-result');
  const active = importCandidates.filter(c => c.decision !== 'discard');
  if (importCandidates.length === 0) { result.innerHTML = ''; return; }

  const cats = existingCategories();

  let html = `<div class="import-summary">
    <span style="color:var(--primary)">✨ ${importCandidates.length}件の知識候補に仕分けしました</span>
    <span style="font-size:12px;color:var(--text-muted);font-weight:400">確認・修正してから追加してください</span>
  </div>`;

  importCandidates.forEach((c, idx) => {
    const discarded = c.decision === 'discard';
    if (discarded) {
      html += `<div class="import-candidate" style="opacity:.55">
        <div class="import-cand-head">
          <span class="import-badge">候補 ${idx + 1}</span>
          <span style="flex:1;font-size:13px;color:var(--text-muted)">🗑 破棄予定：${escHtml(c.q)}</span>
          <button class="btn btn-sm btn-outline" onclick="setDecision('${c.id}','new')">戻す</button>
        </div>
      </div>`;
      return;
    }

    // 重複警告パネル
    let dupHtml = '';
    if (c.dup) {
      const ex = c.dup.item;
      const exPreview = escHtml((ex.a || '').replace(/【.*?】/g, '').replace(/\n/g, ' ').slice(0, 80));
      dupHtml = `<div class="dup-warn">
        <div class="dup-warn-title">⚠️ 既存の知識と似ています</div>
        <div class="dup-compare">
          <div style="color:var(--text-muted);margin-bottom:2px">既存（旧）：</div>
          <div style="font-weight:600">${escHtml(ex.q)}</div>
          <div style="color:var(--text-sub)">${exPreview}…</div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:3px">追加日: ${escHtml(ex.addedAt || '—')}｜カテゴリ: ${escHtml(ex.category || '—')}</div>
        </div>
        <div style="color:var(--text-sub)">どう扱いますか？</div>
        <div class="dup-actions">
          <button class="${c.decision === 'overwrite' ? 'sel-overwrite' : ''}" onclick="setDecision('${c.id}','overwrite')">↻ 上書き更新（新で置き換え）</button>
          <button class="${c.decision === 'new' ? 'sel-separate' : ''}" onclick="setDecision('${c.id}','new')">＋ 別物として追加</button>
          <button class="${c.decision === 'discard' ? 'sel-discard' : ''}" onclick="setDecision('${c.id}','discard')">🗑 この候補を破棄</button>
        </div>
      </div>`;
    }

    // カテゴリ選択
    const catOptions = cats.map(cat =>
      `<option value="${escHtml(cat)}" ${c.catMode === 'existing' && c.category === cat ? 'selected' : ''}>${escHtml(cat)}</option>`
    ).join('');
    const catSelect = c.catMode === 'new'
      ? `<input class="form-input" id="imp-catnew-${c.id}" value="${escHtml(c.category)}" placeholder="新しいカテゴリ名">
         <div style="margin-top:3px"><button class="btn btn-sm btn-outline" onclick="setCatMode('${c.id}','existing')">既存から選ぶ</button></div>`
      : `<select class="form-input" id="imp-cat-${c.id}" onchange="onCatChange('${c.id}',this.value)">
           ${catOptions}
           <option value="__new__">＋ 新しいカテゴリ…</option>
         </select>`;

    html += `<div class="import-candidate">
      <div class="import-cand-head">
        <span class="import-badge">候補 ${idx + 1}</span>
        <input class="form-input" id="imp-q-${c.id}" value="${escHtml(c.q)}" style="flex:1;font-weight:600" placeholder="質問文">
        <button class="btn btn-outline import-del" onclick="setDecision('${c.id}','discard')" title="破棄">✕</button>
      </div>
      ${dupHtml}
      <div class="import-field">
        <label class="lbl-k">📘 知識</label>
        <textarea class="form-textarea" id="imp-k-${c.id}" style="min-height:44px">${escHtml(c.knowledge)}</textarea>
      </div>
      <div class="import-field">
        <label class="lbl-p">🛠 対応手順<span style="font-weight:400;color:var(--text-muted)">（無ければ空欄でOK）</span></label>
        <textarea class="form-textarea" id="imp-p-${c.id}" style="min-height:44px">${escHtml(c.procedure)}</textarea>
      </div>
      <div class="import-field">
        <label class="lbl-b">💡 ベスト提案<span style="font-weight:400;color:var(--text-muted)">（無ければ空欄でOK）</span></label>
        <textarea class="form-textarea" id="imp-b-${c.id}" style="min-height:44px">${escHtml(c.proposal)}</textarea>
      </div>
      <div class="import-cat-row">
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--text-sub);display:block;margin-bottom:3px">カテゴリ</label>
          ${catSelect}
        </div>
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--text-sub);display:block;margin-bottom:3px">画像URL（任意）</label>
          <input class="form-input" id="imp-img-${c.id}" value="${escHtml(c.image)}" placeholder="https://...">
        </div>
      </div>
    </div>`;
  });

  html += `<div class="form-row" style="margin-top:6px;align-items:center">
    <button class="btn btn-primary btn-sm" onclick="commitImport()">✅ ${active.length}件を知識ベースに追加</button>
    <button class="btn btn-outline btn-sm" onclick="clearImport()">すべて破棄</button>
    <span style="font-size:12px;color:var(--text-muted);margin-left:4px">追加後はFAQですぐ回答に使われます</span>
  </div>`;

  result.innerHTML = html;
}

function setDecision(id, decision) {
  syncImportFromDom();
  const c = importCandidates.find(x => x.id === id);
  if (c) c.decision = decision;
  renderImport();
}

function onCatChange(id, val) {
  syncImportFromDom();
  const c = importCandidates.find(x => x.id === id);
  if (!c) return;
  if (val === '__new__') { c.catMode = 'new'; c.category = ''; }
  else { c.category = val; }
  renderImport();
}

function setCatMode(id, mode) {
  syncImportFromDom();
  const c = importCandidates.find(x => x.id === id);
  if (c) c.catMode = mode;
  renderImport();
}

// 3部構成の回答テキストを組み立て
function buildAnswerField(c) {
  const parts = [];
  if (c.knowledge && c.knowledge.trim()) parts.push('【知識】\n' + c.knowledge.trim());
  if (c.procedure && c.procedure.trim()) parts.push('【対応手順】\n' + c.procedure.trim());
  if (c.proposal && c.proposal.trim()) parts.push('【ベスト提案】\n' + c.proposal.trim());
  return parts.join('\n');
}

function commitImport() {
  syncImportFromDom();
  const toAdd = importCandidates.filter(c => c.decision !== 'discard');
  if (toAdd.length === 0) { alert('追加する候補がありません'); return; }

  let added = 0, updated = 0;
  for (const c of toAdd) {
    if (!c.q.trim()) continue;
    const a = buildAnswerField(c);
    const imgs = parseImageUrls(c.image);

    if (c.decision === 'overwrite' && c.dup) {
      const target = knowledgeBase.find(k => k.id === c.dup.item.id);
      if (target) {
        target.q = c.q.trim();
        target.a = a;
        target.category = c.category || '未分類';
        if (imgs.length) target.images = imgs;
        target.source = '一括取り込み（更新）';
        target.addedAt = nowStr();
        updated++;
        continue;
      }
    }
    knowledgeBase.push({
      id: nextId++,
      q: c.q.trim(),
      a,
      category: c.category || '未分類',
      source: '一括取り込み',
      images: imgs,
      addedAt: nowStr()
    });
    added++;
  }

  importCandidates = [];
  document.getElementById('import-src').value = '';
  document.getElementById('import-result').innerHTML =
    `<div class="dup-warn" style="background:var(--success-light);border-color:#a7f3d0">
      <div class="dup-warn-title" style="color:var(--success)">✅ 取り込み完了</div>
      <div>新規追加 ${added}件${updated ? ` ／ 上書き更新 ${updated}件` : ''} を知識ベースに反映しました。</div>
    </div>`;
  renderKB();
  updateStats();
}

function clearImport() {
  importCandidates = [];
  document.getElementById('import-src').value = '';
  document.getElementById('import-result').innerHTML = '';
}

function renderKB() {
  const list = document.getElementById('kb-list');
  const searchVal = document.getElementById('kb-search')?.value.toLowerCase() || '';
  const items = knowledgeBase.filter(item =>
    !searchVal ||
    item.q.toLowerCase().includes(searchVal) ||
    item.a.toLowerCase().includes(searchVal) ||
    (item.category || '').toLowerCase().includes(searchVal)
  );

  if (items.length === 0) {
    list.innerHTML = '<div class="kb-empty">該当する知識がありません</div>';
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="kb-item">
      <div class="kb-item-head" onclick="toggleKB(${item.id})">
        <div class="kb-item-q">
          <span class="kb-tag">${escHtml(item.category || '未分類')}</span>
          ${escHtml(item.q)}
        </div>
        <span style="color:var(--text-muted);font-size:12px">▼</span>
      </div>
      <div class="kb-item-body" id="kb-body-${item.id}">
        ${mdToHtml(item.a)}
        ${imagesHtml([item])}
        <div class="kb-item-source">出典: ${escHtml(item.source || '—')} | 追加日: ${escHtml(item.addedAt || '—')}${(item.images||[]).length ? ` | 🖼 画像${item.images.length}枚` : ''}</div>
        <div style="margin-top:10px">
          <button class="btn btn-sm btn-outline" onclick="deleteKB(${item.id})">🗑 削除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleKB(id) {
  const body = document.getElementById(`kb-body-${id}`);
  body.classList.toggle('open');
}

function deleteKB(id) {
  if (!confirm('この知識を削除しますか？')) return;
  knowledgeBase = knowledgeBase.filter(k => k.id !== id);
  renderKB();
  updateStats();
}

let addFormOpen = false;
function toggleAddForm() {
  addFormOpen = !addFormOpen;
  document.getElementById('add-form-wrap').style.display = addFormOpen ? 'block' : 'none';
}

function addKB() {
  const q = document.getElementById('new-q').value.trim();
  const a = document.getElementById('new-a').value.trim();
  const cat = document.getElementById('new-cat').value.trim();
  const src = document.getElementById('new-src').value.trim();
  const imgs = parseImageUrls(document.getElementById('new-img').value);
  if (!q || !a) { alert('質問と回答は必須です'); return; }

  knowledgeBase.push({
    id: nextId++,
    q, a,
    category: cat || '未分類',
    source: src || '手動追加',
    images: imgs,
    addedAt: nowStr()
  });

  document.getElementById('new-q').value = '';
  document.getElementById('new-a').value = '';
  document.getElementById('new-cat').value = '';
  document.getElementById('new-src').value = '';
  document.getElementById('new-img').value = '';
  toggleAddForm();
  renderKB();
  updateStats();
}

// ═══════════════════════════════════════════════
//  ユーティリティ
// ═══════════════════════════════════════════════

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// 簡易Markdown整形（見出し【】・太字・箇条書き）
function mdToHtml(s) {
  const escaped = escHtml(s);
  const lines = escaped.split('\n');
  let html = '';
  let inList = false;
  const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };

  const sectionStyle = {
    '知識': { color: '#2563eb', icon: '📘' },
    '対応手順': { color: '#d97706', icon: '🛠' },
    'ベスト提案': { color: '#059669', icon: '💡' }
  };

  for (const line of lines) {
    const t = line.trim();
    const head = t.match(/^【(.+?)】(.*)$/);
    if (head) {
      closeList();
      const label = head[1];
      const st = sectionStyle[label] || { color: 'var(--text-sub)', icon: '' };
      html += `<div style="font-weight:700;font-size:12px;color:${st.color};margin:10px 0 4px;letter-spacing:.03em">${st.icon} ${label}</div>`;
      if (head[2].trim()) html += `<div>${head[2].trim()}</div>`;
    } else if (t.startsWith('- ') || t.startsWith('・')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${t.replace(/^(- |・)/, '')}</li>`;
    } else {
      closeList();
      if (t) html += `<div>${t}</div>`;
    }
  }
  closeList();
  return html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

// 知識項目の画像をまとめてギャラリー表示
function imagesHtml(items) {
  const urls = [];
  for (const item of (items || [])) {
    for (const url of (item.images || [])) {
      if (url && !urls.includes(url)) urls.push(url);
    }
  }
  if (urls.length === 0) return '';
  return `<div class="answer-images">${
    urls.slice(0, 5).map(u =>
      `<img src="${escHtml(u)}" alt="参考画像" onclick="window.open('${escHtml(u)}','_blank')" onerror="this.style.display='none'">`
    ).join('')
  }</div>`;
}

// 参照した知識のタイトル表示
function refLabel(items) {
  if (!items || items.length === 0) return '';
  return '：' + items.map(i => escHtml(i.q)).join('、');
}

// 画像URL入力欄のテキストを配列化（改行・カンマ区切り、最大5枚）
function parseImageUrls(text) {
  return (text || '')
    .split(/[\n,]/)
    .map(s => s.trim())
    .filter(s => s.startsWith('http'))
    .slice(0, 5);
}

function nowStr() {
  return new Date().toLocaleDateString('ja-JP', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

}

// ピンチ／ダブルタップ拡大を無効化
(function(){
  ['gesturestart','gesturechange','gestureend'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); }, { passive: false });
  });
  document.addEventListener('touchmove', function(e){
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  let lastTouch = 0;
  document.addEventListener('touchend', function(e){
    const now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
})();

const STORE_KEY = 'miwa.faq.store';
const BRAND_KEY = 'miwa.faq.brand';
let _ssBrand = (()=>{ try{return localStorage.getItem(BRAND_KEY)||'green';}catch(e){return 'green';} })();

// 青のみわ店舗マッピング
const BLUE_STORES = new Set(['モール草加','マミー安行','西友伊原']);
function brandForStore(name) {
  return BLUE_STORES.has(name) ? 'blue' : 'green';
}

function setSsBrand(b) {
  _ssBrand = b;
  ['green','blue'].forEach(k => {
    const el = document.getElementById('ss-brand-'+k);
    if (el) el.classList.toggle('active', k===b);
  });
}
function faqBrand() {
  try { return localStorage.getItem(BRAND_KEY) || 'green'; } catch(e) { return 'green'; }
}

function selectStore(name) {
  if (name === '本部') { showHonbuBrandPanel(); return; }
  const brand = brandForStore(name);
  _ssBrand = brand;
  try { localStorage.setItem(STORE_KEY, name); localStorage.setItem(BRAND_KEY, brand); } catch(e) {}
  updateStoreStatus(name);
  const el = document.getElementById('store-select');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
}
function showHonbuBrandPanel() {
  const p = document.getElementById('ss-honbu-panel');
  if (p) p.style.display = 'flex';
}
function selectHonbuBrand(brand) {
  _ssBrand = brand;
  try { localStorage.setItem(STORE_KEY, '本部'); localStorage.setItem(BRAND_KEY, brand); } catch(e) {}
  updateStoreStatus('本部');
  const el = document.getElementById('store-select');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
}

  const d = document.createElement('div');
  d.id = 'store-select';
  const inner =
    '<div class="ss-logo"></div>' +
    '<div class="ss-title">'+(titleText||'店舗を選んでください')+'</div>' +
    '<div class="ss-sub">'+(subText||'選択した店舗はこの端末に記憶されます')+'</div>' +
    '<div class="ss-grid">' +
      stores.map(function(s){ return '<button class="ss-btn" onclick="selectStore(\''+s+'\')">'+s+'</button>'; }).join('') +
      '<button class="ss-btn" onclick="selectStore(\'本部\')" style="grid-column:span 3;background:#f1f5f9;color:#374151">🏢 本部</button>' +
    '</div>' +
    '<div id="ss-honbu-panel" style="display:none;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:460px;margin-top:4px">' +
      '<div style="font-size:13.5px;font-weight:700;color:#374151">本部のブランドを選んでください</div>' +
      '<div class="ss-brand-row">' +
        '<button class="ss-brand-btn" onclick="selectHonbuBrand(\'green\')"><span class="ss-brand-dot" style="background:#1a8f5c"></span>緑のみわ</button>' +
        '<button class="ss-brand-btn" onclick="selectHonbuBrand(\'blue\')"><span class="ss-brand-dot" style="background:#1a6dbd"></span>青のみわ</button>' +
      '</div>' +
      '<button onclick="document.getElementById(\'ss-honbu-panel\').style.display=\'none\'" style="font-size:12px;color:#999;background:none;border:none;cursor:pointer">← 戻る</button>' +
    '</div>' +
    '<div class="ss-note">あとからヘッダーの店舗名をタップして変更できます</div>';
  if (window.innerWidth >= 601) {
    // PC: モーダルカード表示（半透明バックドロップ＋角丸カード）
    d.style.cssText = 'position:fixed;inset:0;z-index:9998;background:rgba(100,130,160,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .4s ease;';

  } else {
    // モバイル: 従来の全画面表示
    d.style.cssText = 'position:fixed;top:0;right:0;bottom:0;left:0;z-index:9998;background:linear-gradient(165deg,#f1f6ee 0%,#e8f5e3 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch;opacity:0;transition:opacity .4s ease;';
    d.innerHTML = inner;
  }
  document.body.appendChild(d);
  requestAnimationFrame(function(){ d.style.opacity = '1'; });
}
function changeStore() {
  showStoreSelect('店舗を変更する', 'この端末の店舗設定を変更します');
}
function updateStoreStatus(name) {
  const el = document.getElementById('store-status');
  if (!el) return;
  if (name) {
    el.textContent = name;
    el.style.color = 'var(--success)';
  } else {
    el.textContent = 'オンライン';
    el.style.color = '';
  }
  // ブランドバッジ更新
  const badge = document.getElementById('brand-badge');
  if (!badge) return;
  const brand = faqBrand();
  const isBlue = brand === 'blue';
  const label = isBlue ? '青のみわ' : '緑のみわ';
  const color = isBlue ? '#1a6dbd' : '#1a8f5c';
  badge.innerHTML = `<span class="bd" style="background:${color};box-shadow:0 0 0 1.5px rgba(255,255,255,.6)"></span>${label}`;
  badge.style.display = name ? 'inline-flex' : 'none';
}

// クラウド知識ベース読み込み（設定済みの場合）→ 完了後にスプラッシュを消す
(async function(){
  // URLパラメータに ?store=XXX があれば自動保存
  try {
    const p = new URLSearchParams(location.search).get('store');
    if (p) { localStorage.setItem(STORE_KEY, decodeURIComponent(p)); }
  } catch(e) {}

  await loadKBFromCloud();

  document.body.classList.add('chat-mode');
  addBotBubble(
    `クリーニングみわ FAQへようこそ！<br>業務でわからないことを質問してください。<br><span class="src">登録された知識だけを参照して回答します。答えが無い質問は管理者に届きます。</span>`
  );

  const sp = document.getElementById('splash');
  if (sp) { setTimeout(() => { sp.classList.add('hide'); setTimeout(() => sp.remove(), 600); }, 400); }

  // 店舗名の確認（スプラッシュが消えた後に表示）
  const storedStore = (() => { try { return localStorage.getItem(STORE_KEY) || ''; } catch(e) { return ''; } })();
  updateStoreStatus(storedStore);

  if (!storedStore) {
    // 未設定 → スプラッシュ消滅後に店舗選択画面を動的生成して表示
    setTimeout(() => showStoreSelect(), 800);
  }
  // 設定済みの場合は何もしない（store-select は静的HTMLに存在しない）
})();
